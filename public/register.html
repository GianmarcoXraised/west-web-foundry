<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create your account — West Web Foundry</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="appbar">
  <div class="appbar-inner">
    <a class="logo" href="/"><img class="logo-img" src="/logo.svg" alt="" width="34" height="34"><span class="logo-name">West Web Foundry</span></a>
    <div class="appbar-right"><a href="/">← Back to site</a></div>
  </div>
</header>

<div class="auth-wrap">
  <div class="card auth-card">
    <span class="eyebrow">Client portal</span>
    <h1 style="margin-top:8px">Create your account</h1>
    <p class="sub">For West Web Foundry clients. Once you're set up, you'll track your build, URL and invoices right here.</p>

    <div class="msg err" id="msg"></div>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password <span class="muted">(min 8 characters)</span></label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8">
      </div>
      <button type="submit" class="btn btn-molten" id="submitBtn">Create account</button>
    </form>

    <p class="auth-alt">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>

<script>
const form = document.getElementById('registerForm');
const msg = document.getElementById('msg');
const btn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sign up failed.');
    window.location.href = '/dashboard';
  } catch (err) {
    msg.textContent = err.message;
    msg.classList.add('show');
    btn.disabled = false; btn.textContent = 'Create account';
  }
});
</script>
</body>
</html>
